<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando...</title>
</head>
<body style="margin: 0; padding: 0; background: #0a0a0a;">
  <script>
    // Redireciona de /reset-password?code=XXX&type=recovery para /#/admin/reset-password?code=XXX&type=recovery
    const params = new URLSearchParams(window.location.search);
    window.location.replace(`${window.location.origin}/#/admin/reset-password?${params.toString()}`);
  </script>
</body>
</html>
